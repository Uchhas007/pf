{% extends 'adminlayout.html' %}
{% block body %}
<div class="container-fluid py-4" style="max-width:700px;">
  <h2 style="color:#00ffff;">📨 Contact Message</h2>
  <a href="{{ url_for('admin.manage', table_name='contacts') }}" style="color:#ff007f;">← Back to Contacts</a>

  <div class="mt-4 p-4" style="background:rgba(0,0,0,0.5);border:1px solid #ff007f;border-radius:8px;">
    <p><strong style="color:#ff007f;">Name:</strong> <span style="color:#00ffff;">{{ contact.name }}</span></p>
    <p><strong style="color:#ff007f;">Phone:</strong> <span style="color:#00ffff;">{{ contact.num }}</span></p>
    <p><strong style="color:#ff007f;">Email:</strong> <span style="color:#00ffff;">{{ contact.email }}</span></p>
    <p><strong style="color:#ff007f;">Subject:</strong> <span style="color:#00ffff;">{{ contact.subject }}</span></p>
    <p><strong style="color:#ff007f;">Message:</strong></p>
    <div style="color:#00ffff;background:#000;padding:1rem;border-radius:4px;border:1px solid #ff007f;">{{ contact.msg }}</div>
    <p class="mt-2"><strong style="color:#ff007f;">Date:</strong> <span style="color:#00ffff;">{{ contact.date }}</span></p>
  </div>

  <form action="{{ url_for('admin.delete_contact', sno=contact.sno) }}" method="POST" class="mt-3" onsubmit="return confirm('Delete this message?');">
    <button type="submit" class="btn btn-danger">🗑️ Delete Message</button>
  </form>
</div>
{% endblock %}
