<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Panel | Uchhas Saha</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Roboto+Mono:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Press Start 2P", cursive;
        background: linear-gradient(to bottom, #000000, #800080);
        color: #00ffff;
        overflow-x: hidden;
        margin: 0;
        padding: 0;
      }
      .sidebar {
        height: 100vh;
        width: 260px;
        background: linear-gradient(to bottom, #800080, #ff007f);
        padding: 1.5rem 1rem;
        position: fixed;
        top: 0;
        left: 0;
        box-shadow: 0 0 20px rgba(255, 0, 127, 0.8);
        overflow-y: auto;
        scrollbar-width: none;
        transition: transform 0.3s ease;
        z-index: 100;
      }
      .sidebar.hidden {
        transform: translateX(-260px);
      }
      .sidebar a {
        display: block;
        margin: 0.8rem 0;
        padding: 0.7rem 1rem;
        border-radius: 5px;
        background: #000;
        color: #00ffff;
        text-decoration: none;
        font-size: 0.65rem;
      }
      .sidebar a:hover {
        background: #ff007f;
        color: #000;
      }
      .sidebar .brand {
        color: #00ffff;
        font-size: 0.8rem;
        margin-bottom: 1.5rem;
        text-align: center;
      }
      .main-content {
        margin-left: 260px;
        padding: 2rem;
        transition: margin-left 0.3s ease;
        min-height: 100vh;
      }
      .main-content.expanded {
        margin-left: 0;
      }
      .topbar {
        background: #000;
        color: #ff007f;
        padding: 1rem 2rem;
        font-size: 1rem;
        border-bottom: 3px solid #00ffff;
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }
      .toggle-btn {
        background: #ff007f;
        color: #00ffff;
        border: none;
        padding: 0.4rem 0.8rem;
        cursor: pointer;
        border-radius: 4px;
      }
      .footer {
        text-align: center;
        margin-top: 4rem;
        font-size: 0.6rem;
        color: #00ffff;
      }
      @media (max-width: 768px) {
        .sidebar {
          transform: translateX(-260px);
        }
        .sidebar.show {
          transform: translateX(0);
        }
        .main-content {
          margin-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="d-flex">
      <div class="sidebar" id="sidebar">
        <div class="brand">🌴 ADMIN PANEL</div>
        <a href="{{ url_for('admin.dashboard') }}">📊 Dashboard</a>
        <a href="{{ url_for('admin.profile') }}">👤 My Profile</a>
        <hr style="border-color: #00ffff" />
        <a href="{{ url_for('admin.manage', table_name='contacts') }}"
          >📼 Contacts</a
        >
        <a href="{{ url_for('admin.manage', table_name='projects') }}"
          >🎮 Projects</a
        >
        <a href="{{ url_for('admin.manage', table_name='resume') }}"
          >💾 Resume</a
        >
        <a href="{{ url_for('admin.manage', table_name='skills') }}"
          >🕹️ Skills</a
        >
        <a href="{{ url_for('admin.manage', table_name='cv') }}">📺 CV</a>
        <a href="{{ url_for('admin.manage', table_name='certificates') }}"
          >🎵 Certificates</a
        >
        <a href="{{ url_for('admin.manage', table_name='services') }}"
          >🍒 Services</a
        >
        <a href="{{ url_for('admin.manage', table_name='xp') }}"
          >🕶️ Experience</a
        >
        <a href="{{ url_for('admin.manage', table_name='language') }}"
          >🌐 Languages</a
        >
        <hr style="border-color: #00ffff" />
        <a
          href="{{ url_for('admin.logout') }}"
          style="background: #ff007f; color: #000; text-align: center"
          >🚪 Logout</a
        >
      </div>

      <div class="main-content" id="main-content">
        <div class="topbar">
          <button class="toggle-btn" id="toggle-btn">☰</button>
          🌴 RETRO ADMIN DASHBOARD
        </div>
        {% block body %}{% endblock %}
        <div class="footer">🕹️ Uchhas Saha Admin Panel</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      const sidebar = document.getElementById("sidebar");
      const mainContent = document.getElementById("main-content");
      const toggleBtn = document.getElementById("toggle-btn");
      if (toggleBtn) {
        toggleBtn.addEventListener("click", () => {
          sidebar.classList.toggle("hidden");
          mainContent.classList.toggle("expanded");
        });
      }
    </script>
  </body>
</html>
