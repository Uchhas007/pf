<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>Uchhas Saha | Admin Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&family=Quicksand:wght@500&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(to right, #6a11cb, #2575fc);
        font-family: "Quicksand", sans-serif;
        height: 100vh;
      }
      .form-signin {
        max-width: 400px;
        margin: auto;
        padding: 3rem;
        background-color: rgba(255, 255, 255, 0.9);
        border-radius: 10px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
      }
      .form-signin img {
        width: 80px;
        height: 80px;
        margin-bottom: 1.5rem;
        border-radius: 50%;
      }
      .form-control {
        border-radius: 30px;
        border: 1px solid #ddd;
        margin-bottom: 1rem;
        padding: 1rem;
        font-size: 1rem;
      }
      .form-control:focus {
        border-color: #2575fc;
        box-shadow: 0 0 5px rgba(37, 117, 252, 0.6);
      }
      .btn-primary {
        background-color: #2575fc;
        border-color: #2575fc;
        border-radius: 30px;
        padding: 1rem;
        font-size: 1.1rem;
        font-weight: 600;
      }
      .btn-primary:hover {
        background-color: #1a62d8;
        border-color: #1a62d8;
      }
    </style>
  </head>
  <body class="d-flex justify-content-center align-items-center">
    {% with messages = get_flashed_messages(with_categories=true) %} {% if
    messages %}
    <div style="position: fixed; top: 20px; width: 100%; z-index: 999">
      {% for category, message in messages %}
      <div
        class="alert alert-{{ category }} text-center mx-auto"
        style="max-width: 400px"
      >
        {{ message }}
      </div>
      {% endfor %}
    </div>
    {% endif %} {% endwith %}
    <form
      class="form-signin"
      action="{{ url_for('admin.login') }}"
      method="POST"
    >
      <div class="text-center">
        <img
          src="{{ url_for('static', filename='images/bg_1.png') }}"
          alt="Logo"
        />
        <h1 class="h3 mb-4 font-weight-normal">Admin Login</h1>
      </div>
      <input
        type="email"
        name="username"
        class="form-control"
        placeholder="Email address"
        required
        autofocus
      />
      <input
        type="password"
        name="password"
        class="form-control"
        placeholder="Password"
        required
      />
      <button class="btn btn-lg btn-primary btn-block w-100 mt-2" type="submit">
        Sign in
      </button>
    </form>
  </body>
</html>
